appId: app.dictate
productName: "dictate.app"
copyright: "Copyright 2026 dictate.app"

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/icon.ico

nsis:
  oneClick: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: "dictate.app"

files:
  - src/**/*
  - node_modules/**/*
  - package.json

# No extraResources — never bundle .env or secrets into the installer
